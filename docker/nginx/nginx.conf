# Production Nginx reverse-proxy configuration.
# Terminates TLS and forwards traffic to the agripewebui container.
#
# SSL SETUP — ONE-TIME BOOTSTRAP SEQUENCE
# ----------------------------------------
# Prerequisites on the VPS:
#   - Docker and Docker Compose v2 installed.
#   - DNS A record for CHANGE_ME_DOMAIN pointing to the VPS public IP.
#   - Ports 80 and 443 open: ufw allow 80 && ufw allow 443
#
# Step 1 — Start the proxy with the HTTP-only bootstrap config:
#     cp docker/nginx/nginx.http-only.conf docker/nginx/nginx.conf
#     docker compose -f docker/docker-compose.yml up -d nginx-proxy
#
# Step 2 — Obtain the initial certificate:
#     docker compose -f docker/docker-compose.yml run --rm certbot \
#       certonly --webroot \
#       -w /var/www/certbot \
#       -d CHANGE_ME_DOMAIN \
#       --email admin@CHANGE_ME_DOMAIN \
#       --agree-tos \
#       --no-eff-email
#
# Step 3 — Restore this TLS config and reload:
#     git checkout docker/nginx/nginx.conf
#     docker compose -f docker/docker-compose.yml exec nginx-proxy nginx -s reload
#
# Step 4 — Start remaining services:
#     docker compose -f docker/docker-compose.yml up -d
#
# Certificate renewal:
#     The certbot service renews automatically every 12 h.
#     Add a host cron job to reload Nginx after renewal:
#       0 3 * * * docker exec nginx-proxy nginx -s reload
#
# IMPORTANT: Replace every occurrence of CHANGE_ME_DOMAIN with the real domain
# before deploying. Validate with: grep -r CHANGE_ME docker/nginx/

# HTTP block — redirect all traffic to HTTPS, except Let's Encrypt ACME challenge
server {
    listen 80;
    server_name CHANGE_ME_DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS block — terminate TLS and forward to the internal agripewebui service
server {
    listen 443 ssl;
    server_name CHANGE_ME_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/CHANGE_ME_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/CHANGE_ME_DOMAIN/privkey.pem;

    # Modern TLS settings
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    location / {
        proxy_pass         http://agripewebui:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Upgrade headers kept for future WebSocket (e.g., MQTT over WebSocket) support
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
        proxy_buffering    off;
    }
}
