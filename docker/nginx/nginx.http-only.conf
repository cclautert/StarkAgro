# Bootstrap HTTP-only Nginx configuration.
# Use this file BEFORE certificates exist (first-time deploy).
# Mount this as nginx.conf, start the proxy, obtain the Let's Encrypt certificate
# (see the SSL setup instructions in nginx.conf), then switch to nginx.conf.
#
# IMPORTANT: Replace CHANGE_ME_DOMAIN with the real domain before deploying.

server {
    listen 80;
    server_name agripeweb.com;

    # Serve Let's Encrypt ACME challenge from the shared certbot-webroot volume
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Return a simple 200 for all other requests during the bootstrap phase
    location / {
        return 200 "OK";
    }
}
