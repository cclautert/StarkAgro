# Mosquitto configuration — StarkAgro IoT broker
#
# AUTHENTICATION: anonymous access disabled; all clients must authenticate.
# Generate password file: mosquitto_passwd -c docker/mosquitto/passwd <username>
#
# TLS (port 8883): for external IoT devices (ESP8266/ESP32).
# Provision certs in docker/mosquitto/certs/ before enabling.
# See docker/mosquitto/certs/README.md for self-signed cert generation.
#
# ACL: see docker/mosquitto/acl.example to restrict publish/subscribe per topic.
# TODO: enable acl_file for production multi-device deployments

# Internal listener — Docker-internal only, no host port binding
listener 1883
allow_anonymous false
password_file /mosquitto/config/passwd

# TLS listener — for external IoT devices
# Mount certs volume (docker-compose) and provision files before starting.
listener 8883
cafile /mosquitto/config/certs/ca.crt
certfile /mosquitto/config/certs/server.crt
keyfile /mosquitto/config/certs/server.key
tls_version tlsv1.3
require_certificate false
allow_anonymous false
password_file /mosquitto/config/passwd

# Uncomment to enforce per-topic publish/subscribe restrictions (see acl.example)
# acl_file /mosquitto/config/acl

persistence true
persistence_location /mosquitto/data/
log_dest stdout
