version: '3.8'
services:
  agripewebapi:
    build:
      context: ../AgripeWebAPI  # Navigate up to C:\Users\Cristiano\source\repos\cclautert\AgripeWeb\AgripeWebAPI
      dockerfile: Dockerfile  # Assumes Dockerfile is in AgripeWebAPI folder
    ports:
      - "8080:8080"  # Map port 8080 (host) to 80 (container)
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - db  # Ensure SQL Server starts first
    networks:
      - app-network

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest  # SQL Server 2022
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=SQL_SERVER_PASSWORD_REDACTED  # Must meet complexity requirements
      - MSSQL_PID=Express
    ports:
      - "1433:1433"  # Map SQL Server port
    volumes:
      - sql-data:/var/opt/mssql  # Persist database data
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  sql-data: