# AgripeWeb – API (MongoDB), UI (Angular), MongoDB
# Run from repo root: docker compose -f docker/docker-compose.yml up -d
# nginx-proxy: host ports 80 (HTTP->HTTPS redirect) and 443 (HTTPS)
# MongoDB: internal only (no host port binding)

name: agripeweb
services:
  agripewebapi:
    container_name: agripewebapi
    build:
      context: ..
      dockerfile: AgripeWebAPI/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_HTTP_PORTS=8080
      - MongoDb__ConnectionString=mongodb://db:27017/agripeweb?authSource=admin
      - MongoDb__DatabaseName=agripeweb
      - MongoDb__Username=${MONGO_USER}
      - MongoDb__Password=${MONGO_PASSWORD}
      - JwtSettings__secretkey=${JWT_SECRET_KEY}
      - JwtSettings__issuer=${JWT_ISSUER:-agripeweb.com}
      - JwtSettings__audience=${JWT_AUDIENCE:-https://agripeweb.com}
      - OAuth__Google__ClientId=${GOOGLE_CLIENT_ID}
      - OAuth__Google__ClientSecret=${GOOGLE_CLIENT_SECRET}
      - OAuth__Google__AllowedRedirectUris=https://agripeweb.com/login/callback,agripeweb://callback
      - AISettings__GeminiApiKey=${GEMINI_API_KEY}
      - MqttDownlink__Host=mqtt
      - MqttDownlink__Port=1883
      - MqttDownlink__Username=${MQTT_USERNAME}
      - MqttDownlink__Password=${MQTT_PASSWORD}
      - MqttDownlink__UseTls=false
      - Vapid__Subject=${VAPID_SUBJECT:-mailto:admin@agripeweb.com}
      - Vapid__PublicKey=${VAPID_PUBLIC_KEY}
      - Vapid__PrivateKey=${VAPID_PRIVATE_KEY}
    depends_on:
      - db
      - mqtt
    networks:
      - app-network

  agripewebui:
    container_name: agripewebui
    build:
      context: ../AgripeWebUI
      dockerfile: Dockerfile
    environment:
      - API_BASE_URL=http://agripewebapi:8080
    depends_on:
      - agripewebapi
    networks:
      - app-network

  agripewebui-mobile:
    container_name: agripewebui-mobile
    build:
      context: ../AgripeWebUI-Mobile
      dockerfile: Dockerfile
      args:
        - EXPO_PUBLIC_API_BASE_URL=/api/v1/
        - EXPO_PUBLIC_GOOGLE_CLIENT_ID=728628470722-23le0egpfio5jfg14g61i39mjjqcg4vp.apps.googleusercontent.com
    ports:
      - "3000:80"
    environment:
      - API_BASE_URL=http://agripewebapi:8080
    depends_on:
      - agripewebapi
    networks:
      - app-network

  db:
    image: mongo:8
    container_name: agripewebdb
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network


  mqtt:
    image: eclipse-mosquitto:2
    container_name: agripeweb-mqtt
    ports:
      - "8883:8883"
    volumes:
      - mosquitto-data:/mosquitto/data
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/passwd:/mosquitto/config/passwd:ro
      - ./mosquitto/certs:/mosquitto/config/certs:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "localhost", "-p", "1883", "-u", "${MQTT_USERNAME}", "-P", "${MQTT_PASSWORD}", "-t", "healthcheck", "-m", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  agripwebworker:
    container_name: agripwebworker
    build:
      context: ..
      dockerfile: AgripeWebWorker/Dockerfile
    environment:
      - MongoDb__ConnectionString=mongodb://db:27017/agripeweb?authSource=admin
      - MongoDb__DatabaseName=agripeweb
      - MongoDb__Username=${MONGO_USER}
      - MongoDb__Password=${MONGO_PASSWORD}
      - Mqtt__Host=mqtt
      - Mqtt__Port=1883
      - Mqtt__Username=${MQTT_USERNAME}
      - Mqtt__Password=${MQTT_PASSWORD}
      # TLS: set Mqtt__UseTls=true and Mqtt__Port=8883 to enable TLS for external IoT.
      # For Docker-internal connections the bridge network is isolated; TLS is optional.
      - Mqtt__UseTls=false
      - Mqtt__AllowUntrustedCertificates=false
      - Vapid__Subject=${VAPID_SUBJECT:-mailto:admin@agripeweb.com}
      - Vapid__PublicKey=${VAPID_PUBLIC_KEY}
      - Vapid__PrivateKey=${VAPID_PRIVATE_KEY}
    depends_on:
      db:
        condition: service_started
      mqtt:
        condition: service_started
    networks:
      - app-network

  nginx-proxy:
    container_name: nginx-proxy
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-webroot:/var/www/certbot:ro
      - letsencrypt-certs:/etc/letsencrypt:ro
    depends_on:
      - agripewebui
    networks:
      - app-network
    restart: unless-stopped

  certbot:
    container_name: certbot
    image: certbot/certbot:latest
    volumes:
      - certbot-webroot:/var/www/certbot
      - letsencrypt-certs:/etc/letsencrypt
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  mongo-data:
  mosquitto-data:
  certbot-webroot:
  letsencrypt-certs:
