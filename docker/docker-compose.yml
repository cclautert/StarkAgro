# AgripeWeb – API (MongoDB), UI (Angular), MongoDB
# Run from repo root: docker compose -f docker/docker-compose.yml up -d
# API: http://localhost:8080  |  UI: http://localhost (port 80)  |  MongoDB: localhost:27017

name: agripeweb
services:
  agripewebapi:
    container_name: agripewebapi
    build:
      context: ..
      dockerfile: AgripeWebAPI/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - MongoDb__ConnectionString=mongodb://db:27017
      - MongoDb__DatabaseName=agripeweb
    depends_on:
      - db
    networks:
      - app-network

  agripewebui:
    container_name: agripewebui
    build:
      context: ../AgripeWebUI
      dockerfile: Dockerfile
    ports:
      - "80:80"
    environment:
      - API_BASE_URL=http://agripewebapi:8080
    depends_on:
      - agripewebapi
    networks:
      - app-network

  db:
    image: mongo:8
    container_name: agripewebdb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network

  mqtt:
    image: eclipse-mosquitto:2
    container_name: agripeweb-mqtt
    ports:
      - "1883:1883"
    volumes:
      - mosquitto-data:/mosquitto/data
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      - app-network

  agripwebworker:
    container_name: agripwebworker
    build:
      context: ..
      dockerfile: AgripeWebWorker/Dockerfile
    environment:
      - MongoDb__ConnectionString=mongodb://db:27017
      - MongoDb__DatabaseName=agripeweb
      - Mqtt__Host=mqtt
      - Mqtt__Port=1883
    depends_on:
      - db
      - mqtt
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mongo-data:
  mosquitto-data:
