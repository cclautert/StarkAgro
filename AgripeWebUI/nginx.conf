server {
  listen 80;
  server_name localhost;

  # Fotos de celular chegam com 2–8 MB. O default do nginx é 1 MB e rejeitaria o
  # upload do laudo com 413 antes de a API ver o request.
  client_max_body_size 12m;

  root /usr/share/nginx/html;
  index index.csr.html;

  location / {
    try_files $uri $uri/ /index.csr.html;
  }

  # Proxy API calls (UI uses /api/v1/...)
  location /api/ {
    rewrite ^/api(.*)$ $1 break;
    proxy_pass http://agripewebapi:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

