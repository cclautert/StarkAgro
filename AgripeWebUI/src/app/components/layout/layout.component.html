<mat-sidenav-container class="sidenav-container">

  <!-- Sidebar -->
  <mat-sidenav
    #sidenav
    class="sidenav"
    [opened]="showLayout && !(isSmallScreen$ | async)"
    [mode]="(isSmallScreen$ | async) ? 'over' : 'side'">

    <div class="sidenav-header">
      <span class="sidenav-logo">💧</span>
      <span class="sidenav-title">AgripeWeb</span>
    </div>

    <nav class="sidenav-nav">
      <a class="nav-link" routerLink="/home" routerLinkActive="active-link">
        <mat-icon>home</mat-icon>
        <span>Início</span>
      </a>
      <a class="nav-link" routerLink="/irrigation-dashboard" routerLinkActive="active-link">
        <mat-icon>show_chart</mat-icon>
        <span>Gráficos</span>
      </a>
      <a class="nav-link" routerLink="/sensores" routerLinkActive="active-link">
        <mat-icon>sensors</mat-icon>
        <span>Sensores</span>
      </a>
      <a class="nav-link" routerLink="/pivots" routerLinkActive="active-link">
        <mat-icon>rotate_right</mat-icon>
        <span>Pivôs</span>
      </a>

      <a class="nav-link logout-link" (click)="logout()">
        <mat-icon>logout</mat-icon>
        <span>Sair</span>
      </a>
    </nav>
  </mat-sidenav>

  <!-- Main Content -->
  <mat-sidenav-content>
    <mat-toolbar class="main-toolbar" *ngIf="showLayout">
      <button mat-icon-button (click)="sidenav.toggle()">
        <mat-icon>{{ sidenav.opened ? 'menu_open' : 'menu' }}</mat-icon>
      </button>
      <span class="toolbar-title">AgripeWeb</span>
      <span class="toolbar-subtitle">Monitoramento de Irrigação</span>
    </mat-toolbar>

    <main class="main-content">
      <router-outlet></router-outlet>
    </main>
  </mat-sidenav-content>

</mat-sidenav-container>
