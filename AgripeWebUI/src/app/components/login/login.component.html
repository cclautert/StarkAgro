<div class="login-page">
  <div class="login-panel">
    <div class="avatar">
      <img src="../../../assets/avatar.ico" alt="Avatar" />
    </div>
    <h2>AgripWeb</h2>
    <form (ngSubmit)="login()" #loginForm="ngForm">
      <input type="text" name="email" [(ngModel)]="email" placeholder="Email" required />
      <input type="password" name="password" [(ngModel)]="password" placeholder="Password" required />
      <button type="submit">Login</button>
      <button *ngIf="googleLoginEnabled" type="button" class="google-btn" (click)="loginWithGoogle()">
        Entrar com Google
      </button>
    </form>
  </div>
</div>
