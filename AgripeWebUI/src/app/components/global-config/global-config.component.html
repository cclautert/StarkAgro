<div class="form-container">
  <h2>Configuração Global de Limites</h2>
  <p class="subtitle">Estes valores são usados como padrão quando um pivô não tem limites configurados.</p>

  <form [formGroup]="configForm" (ngSubmit)="onSubmit()" class="form-fields">

    <div class="form-group">
      <label for="limiteSuperior">Limite Superior (%)</label>
      <input id="limiteSuperior" type="number" formControlName="limiteSuperior" step="1" min="0" max="100">
    </div>

    <div class="form-group">
      <label for="limiteInferior">Limite Inferior (%)</label>
      <input id="limiteInferior" type="number" formControlName="limiteInferior" step="1" min="0" max="100">
    </div>

    <div class="form-group">
      <label for="rainThresholdMm">Chuva mínima para adiar irrigação (mm)</label>
      <input id="rainThresholdMm" type="number" formControlName="rainThresholdMm" step="0.1" min="0" placeholder="Padrão global: 5 mm">
    </div>

    <hr class="section-divider">

    <h3 class="section-title">Inteligência Artificial</h3>
    <p class="subtitle">
      Chave gratuita do Google AI Studio (até 1.500 análises/dia).
      <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener">Obter chave gratuita</a>
    </p>

    <div class="form-group">
      <label for="geminiApiKey">Chave da API Gemini</label>
      <div class="input-with-toggle">
        <input
          id="geminiApiKey"
          [type]="showApiKey ? 'text' : 'password'"
          formControlName="geminiApiKey"
          placeholder="Cole aqui sua chave do Google AI Studio"
          autocomplete="off">
        <button type="button" class="btn-toggle-key" (click)="showApiKey = !showApiKey" [attr.aria-label]="showApiKey ? 'Ocultar chave' : 'Mostrar chave'">
          {{ showApiKey ? 'Ocultar' : 'Mostrar' }}
        </button>
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary" [disabled]="configForm.invalid">Salvar</button>
      <button type="button" class="btn btn-secondary" (click)="cancelar()">Cancelar</button>
    </div>

  </form>
</div>
