<div class="form-container">
  <h2>Configurações de IA</h2>
  <p class="subtitle">Gerencie as chaves e modelos de IA para a plataforma.</p>

  <div *ngIf="isLoading" class="loading-text">Carregando...</div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" *ngIf="!isLoading">

    <!-- Provider Ativo -->
    <div class="form-group">
      <label for="activeProvider">Provider Ativo</label>
      <select id="activeProvider" formControlName="activeProvider">
        <option value="gemini">Gemini (Google)</option>
        <option value="openai">OpenAI</option>
        <option value="anthropic">Anthropic (Claude)</option>
      </select>
    </div>

    <!-- Gemini -->
    <hr class="section-divider" />
    <p class="section-title">Gemini (Google)</p>

    <div class="form-group">
      <label>Chave da API</label>
      <div class="input-with-toggle">
        <input formControlName="geminiKey"
               [type]="showGeminiKey ? 'text' : 'password'"
               placeholder="AIza..." />
        <button type="button" class="btn-toggle-key" (click)="showGeminiKey = !showGeminiKey">
          {{ showGeminiKey ? 'Ocultar' : 'Mostrar' }}
        </button>
      </div>
    </div>

    <div class="form-group">
      <label for="geminiModel">Modelo</label>
      <select id="geminiModel" formControlName="geminiModel">
        <option *ngFor="let m of geminiModels" [value]="m">{{ m }}</option>
      </select>
    </div>

    <!-- OpenAI -->
    <hr class="section-divider" />
    <p class="section-title">OpenAI</p>

    <div class="form-group">
      <label>Chave da API</label>
      <div class="input-with-toggle">
        <input formControlName="openAiKey"
               [type]="showOpenAiKey ? 'text' : 'password'"
               placeholder="sk-..." />
        <button type="button" class="btn-toggle-key" (click)="showOpenAiKey = !showOpenAiKey">
          {{ showOpenAiKey ? 'Ocultar' : 'Mostrar' }}
        </button>
      </div>
    </div>

    <div class="form-group">
      <label for="openAiModel">Modelo</label>
      <select id="openAiModel" formControlName="openAiModel">
        <option *ngFor="let m of openAiModels" [value]="m">{{ m }}</option>
      </select>
    </div>

    <!-- Anthropic -->
    <hr class="section-divider" />
    <p class="section-title">Anthropic (Claude)</p>

    <div class="form-group">
      <label>Chave da API</label>
      <div class="input-with-toggle">
        <input formControlName="anthropicKey"
               [type]="showAnthropicKey ? 'text' : 'password'"
               placeholder="sk-ant-..." />
        <button type="button" class="btn-toggle-key" (click)="showAnthropicKey = !showAnthropicKey">
          {{ showAnthropicKey ? 'Ocultar' : 'Mostrar' }}
        </button>
      </div>
    </div>

    <div class="form-group">
      <label for="anthropicModel">Modelo</label>
      <select id="anthropicModel" formControlName="anthropicModel">
        <option *ngFor="let m of anthropicModels" [value]="m">{{ m }}</option>
      </select>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary" [disabled]="isSaving">
        {{ isSaving ? 'Salvando...' : 'Salvar Configurações' }}
      </button>
    </div>
  </form>
</div>
