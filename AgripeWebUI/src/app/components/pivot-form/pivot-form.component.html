<mat-card>
  <mat-card-header>
    <mat-card-title>Add Pivot</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <form [formGroup]="pivotForm" (ngSubmit)="onSubmit()">
      <mat-form-field>
        <mat-label>User ID</mat-label>
        <input matInput formControlName="userId" type="number">
        <mat-error *ngIf="pivotForm.get('userId')?.hasError('required')">User ID is required</mat-error>
        <mat-error *ngIf="pivotForm.get('userId')?.hasError('min')">User ID must be positive</mat-error>
      </mat-form-field>
      <mat-form-field>
        <mat-label>Name</mat-label>
        <input matInput formControlName="name">
        <mat-error *ngIf="pivotForm.get('name')?.hasError('required')">Name is required</mat-error>
      </mat-form-field>
      <button mat-raised-button color="primary" type="submit" [disabled]="pivotForm.invalid">Submit</button>
    </form>
  </mat-card-content>
</mat-card>
