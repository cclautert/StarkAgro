<div class="container">

  <!-- Box de Seleção de Pivô -->
  <div class="selector-box">
    <label for="pivot-select">Selecione um Pivô:</label>
    <select
      id="pivot-select"
      class="pivot-selector"
      [(ngModel)]="selectedPivotId"
      (ngModelChange)="onPivotChange()">
      <option *ngFor="let pivot of pivots" [ngValue]="pivot.id">
        {{ pivot.name }}
      </option>
    </select>
  </div>

  <div class="circle-container" *ngIf="currentColors">
    <svg class="quadrant-circle" viewBox="0 0 100 100">
      <!-- Agrupando Path e Text para cada quadrante -->
      <!-- Usamos <g> para agrupar elementos. É bom para organização. -->

      <!-- Quadrante Superior Esquerdo (TopLeft / Quadrante 4) -->
      <g class="clickable-quadrant" (click)="onQuadrantClick('TopLeft')">
        <path
          [attr.fill]="currentColors.topLeft"
          d="M 50,50 L 0,50 A 50,50 0 0,1 50,0 Z">
        </path>
        <!-- Texto com a Média -->
        <text
          *ngIf="currentColors.topLeftAvg !== null"
          x="25" y="25"
          class="quadrant-text">
          {{ currentColors.topLeftAvg | number:'1.0-0' }} kpa
        </text>
        <text x="36" y="46" class="quadrant-number">4</text>
      </g>

      <!-- Quadrante Superior Direito (TopRight / Quadrante 1) -->
      <g class="clickable-quadrant" (click)="onQuadrantClick('TopRight')">
        <path
          [attr.fill]="currentColors.topRight"
          d="M 50,50 L 50,0 A 50,50 0 0,1 100,50 Z">
        </path>
        <text
          *ngIf="currentColors.topRightAvg !== null"
          x="75" y="25"
          class="quadrant-text">
           {{ currentColors.topRightAvg | number:'1.0-0' }} kpa
        </text>
        <text x="64" y="46" class="quadrant-number">1</text>
      </g>

      <!-- Quadrante Inferior Direito (BottomRight / Quadrante 2) -->
      <g class="clickable-quadrant" (click)="onQuadrantClick('BottomRight')">
        <path
          [attr.fill]="currentColors.bottomRight"
          d="M 50,50 L 100,50 A 50,50 0 0,1 50,100 Z">
        </path>
        <text
          *ngIf="currentColors.bottomRightAvg !== null"
          x="75" y="75"
          class="quadrant-text">
          {{ currentColors.bottomRightAvg | number:'1.0-0' }} kpa
        </text>
        <text x="64" y="58" class="quadrant-number">2</text>
      </g>

      <!-- Quadrante Inferior Esquerdo (BottomLeft / Quadrante 3) -->
      <g class="clickable-quadrant" (click)="onQuadrantClick('BottomLeft')">
        <path
          [attr.fill]="currentColors.bottomLeft"
          d="M 50,50 L 50,100 A 50,50 0 0,1 0,50 Z">
        </path>
        <text
          *ngIf="currentColors.bottomLeftAvg !== null"
          x="25" y="75"
          class="quadrant-text">
          {{ currentColors.bottomLeftAvg | number:'1.0-0' }} kpa
        </text>
        <text x="36" y="58" class="quadrant-number">3</text>
      </g>

      <!-- Anéis concêntricos (zonas de irrigação) -->
      <circle cx="50" cy="50" r="15" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="0.5" stroke-dasharray="2,2" pointer-events="none"/>
      <circle cx="50" cy="50" r="30" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="0.5" stroke-dasharray="2,2" pointer-events="none"/>
      <circle cx="50" cy="50" r="45" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="0.5" stroke-dasharray="2,2" pointer-events="none"/>

      <!-- Braço do pivô (eixo central → borda direita) -->
      <line x1="50" y1="50" x2="100" y2="50" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" pointer-events="none"/>

      <!-- Aspersores ao longo do braço -->
      <circle cx="65" cy="50" r="1.5" fill="white" opacity="0.7" pointer-events="none"/>
      <circle cx="80" cy="50" r="1.5" fill="white" opacity="0.7" pointer-events="none"/>
      <circle cx="95" cy="50" r="1.5" fill="white" opacity="0.7" pointer-events="none"/>

      <!-- Hub central -->
      <circle cx="50" cy="50" r="3" fill="#333" stroke="white" stroke-width="0.8" pointer-events="none"/>
    </svg>
  </div>
</div>
