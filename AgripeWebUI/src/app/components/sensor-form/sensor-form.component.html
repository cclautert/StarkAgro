<mat-card>
  <mat-card-header>
    <mat-card-title>Add Sensor</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <form [formGroup]="sensorForm" (ngSubmit)="onSubmit()">
      <mat-form-field>
        <mat-label>Pivot ID</mat-label>
        <input matInput formControlName="pivotId">
        <mat-error *ngIf="sensorForm.get('pivotId')?.hasError('required')">Pivot ID is required</mat-error>
      </mat-form-field>
      <mat-form-field>
        <mat-label>User ID</mat-label>
        <input matInput formControlName="userId" type="number">
        <mat-error *ngIf="sensorForm.get('userId')?.hasError('required')">User ID is required</mat-error>
        <mat-error *ngIf="sensorForm.get('userId')?.hasError('min')">User ID must be positive</mat-error>
      </mat-form-field>
      <mat-form-field>
        <mat-label>Quadrante</mat-label>
        <input matInput formControlName="quadrante" type="number">
        <mat-error *ngIf="sensorForm.get('quadrante')?.hasError('required')">Quadrante is required</mat-error>
        <mat-error *ngIf="sensorForm.get('quadrante')?.hasError('min')">Quadrante must be positive</mat-error>
      </mat-form-field>
      <mat-form-field>
        <mat-label>Code</mat-label>
        <input matInput formControlName="code">
        <mat-error *ngIf="sensorForm.get('code')?.hasError('required')">Code is required</mat-error>
      </mat-form-field>
      <button mat-raised-button color="primary" type="submit" [disabled]="sensorForm.invalid">Submit</button>
    </form>
  </mat-card-content>
</mat-card>
