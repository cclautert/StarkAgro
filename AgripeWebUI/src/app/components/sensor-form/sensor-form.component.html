<div class="form-container">
  <h1>{{ isEditMode ? 'Editar Sensor' : 'Novo Sensor' }}</h1>

  <form [formGroup]="sensorForm" (ngSubmit)="onSubmit()" novalidate>
    <div class="form-group">
      <label for="quadrante">Quadrante</label>
      <input id="quadrante" type="number" formControlName="quadrante" required>
      <div *ngIf="quadrante?.invalid && (quadrante?.dirty || quadrante?.touched)" class="error">
        <div *ngIf="quadrante?.errors?.['required']">Quadrante é obrigatório.</div>
        <div *ngIf="quadrante?.errors?.['min']">O quadrante deve ser no mínimo 1.</div>
      </div>
    </div>

    <div class="form-group">
      <label for="code">Código</label>
      <input id="code" type="text" formControlName="code" required>
      <div *ngIf="code?.invalid && (code?.dirty || code?.touched)" class="error">
        Código é obrigatório.
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary" [disabled]="sensorForm.invalid">
        {{ isEditMode ? 'Atualizar' : 'Salvar' }}
      </button>
      <button type="button" class="btn btn-secondary" (click)="cancelar()">Cancelar</button>
    </div>
  </form>
</div>
