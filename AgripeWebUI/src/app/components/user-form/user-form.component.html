<div class="form-container">
  <h2>Editar Usuário</h2>

  <form [formGroup]="userForm" (ngSubmit)="onSubmit()">

    <!-- Campo Nome -->
    <div class="form-group">
      <label for="name">Name</label>
      <input id="name" type="text" formControlName="name">
      <div class="error" *ngIf="userForm.get('name')?.touched && userForm.get('name')?.hasError('required')">
        Name is required
      </div>
    </div>

    <!-- Campo Email -->
    <div class="form-group">
      <label for="email">Email</label>
      <input id="email" type="email" formControlName="email">
      <div class="error" *ngIf="userForm.get('email')?.touched && userForm.get('email')?.hasError('required')">
        Email is required
      </div>
      <div class="error" *ngIf="userForm.get('email')?.touched && userForm.get('email')?.hasError('email')">
        Invalid email
      </div>
    </div>

    <!-- Campo Password -->
    <div class="form-group">
      <label for="password">Password</label>
      <input id="password" type="password" formControlName="password">
      <div class="error" *ngIf="userForm.get('password')?.touched && userForm.get('password')?.hasError('required')">
        Password is required
      </div>
      <div class="error" *ngIf="userForm.get('password')?.touched && userForm.get('password')?.hasError('minlength')">
        Password must be at least 6 characters
      </div>
    </div>

    <!-- Botões de Ação -->
    <div class="form-actions">
      <button class="btn btn-primary" type="submit" [disabled]="userForm.invalid">Submit</button>
      <button class="btn btn-secondary" type="button" (click)="onCancel()">Cancel</button>
    </div>

  </form>
</div>
