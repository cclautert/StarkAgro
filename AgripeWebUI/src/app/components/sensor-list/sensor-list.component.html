<div class="container">
  <div class="page-header">
    <h1 class="page-title">📡 Sensores</h1>
    <button class="btn-add" [routerLink]="['/sensores/novo']">+ Novo Sensor</button>
  </div>

  <ng-container *ngIf="sensores$ | async as sensores; else loading">
    <div class="sensor-grid">
      <div class="sensor-card" *ngFor="let sensor of sensores">
        <div class="sensor-card-info">
          <span class="sensor-icon">📡</span>
          <div class="sensor-details">
            <span class="sensor-name">{{ sensor.name }}</span>
            <span class="sensor-meta">Pivô: {{ sensor.pivot.name }} &nbsp;|&nbsp; Quadrante: {{ sensor.quadrante }} &nbsp;|&nbsp; Código: {{ sensor.code }}</span>
          </div>
        </div>
        <div class="sensor-card-actions">
          <button class="btn-action btn-edit" (click)="editarSensor(sensor.id!)">Editar</button>
          <button class="btn-action btn-delete" (click)="excluirSensor(sensor.id!)">Excluir</button>
        </div>
      </div>
      <div class="empty-state" *ngIf="sensores.length === 0">
        <span>Nenhum sensor cadastrado.</span>
      </div>
    </div>
  </ng-container>

  <ng-template #loading>
    <p class="loading-text">Carregando sensores...</p>
  </ng-template>
</div>
