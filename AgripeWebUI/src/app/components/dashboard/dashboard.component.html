<div class="dashboard-container">
  <mat-sidenav-container autosize>

    <mat-sidenav-content>
      <div class="selector-box">
        <label for="sensor-select">Selecione um Sensor:</label>
        <select
          id="sensor-select"
          class="sensor-selector"
          [(ngModel)]="selectedSensorId"
          (ngModelChange)="onSensorChange()">
          <option *ngFor="let sensor of sensors" [ngValue]="sensor.id">
            {{ sensor.name }}
          </option>
        </select>
      </div>
      <div class="main">
        <h2>Reads</h2>
        <div class="buttons">
          <button mat-button (click)="setDays(5)">5 days</button>
          <button mat-button (click)="setDays(10)">10 days</button>
          <button mat-button (click)="setDays(30)">30 days</button>
          <button mat-raised-button color="accent" (click)="goToConfig()">Configuração</button>
        </div>

        <canvas baseChart
          [data]="lineChartData"
          [options]="lineChartOptions"
          [type]="'line'">
        </canvas>
      </div>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
