<div class="dashboard-container">

  <!-- Header -->
  <div class="dash-header">
    <div class="dash-title-group">
      <h2 class="dash-title" *ngIf="pivotName">{{ pivotName }} — Quadrante {{ quadrante }}</h2>
      <h2 class="dash-title" *ngIf="!pivotName">Dashboard</h2>
    </div>
    <div class="dash-nav">
      <button class="btn-nav" (click)="goHome()">← Voltar</button>
      <button class="btn-config" (click)="goToConfig()">⚙ Configuração</button>
    </div>
  </div>

  <!-- Sensor Selector -->
  <div class="selector-box">
    <label for="sensor-select">Sensor</label>
    <select
      id="sensor-select"
      class="sensor-selector"
      [(ngModel)]="selectedSensorId"
      (ngModelChange)="onSensorChange()">
      <option *ngFor="let sensor of sensors" [ngValue]="sensor.id">
        {{ sensor.name }}
      </option>
    </select>
  </div>

  <!-- Chart Card -->
  <div class="chart-card">
    <div class="chart-header">
      <span class="chart-label">Leituras do Sensor</span>
      <div class="period-selector">
        <button class="period-btn" [class.active]="numberOfReads === 7" (click)="setDays(7)">7 dias</button>
        <button class="period-btn" [class.active]="numberOfReads === 14" (click)="setDays(14)">14 dias</button>
        <button class="period-btn" [class.active]="numberOfReads === 30" (click)="setDays(30)">30 dias</button>
      </div>
    </div>
    <div class="chart-wrapper">
      <canvas baseChart
        [data]="lineChartData"
        [options]="lineChartOptions"
        [type]="'line'">
      </canvas>
    </div>
  </div>

</div>
