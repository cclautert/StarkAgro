name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend:
    name: Backend (.NET)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore StarkAgro.sln

      - name: Build
        run: dotnet build StarkAgro.sln -c Release --no-restore

      - name: Test with coverage (Coverlet)
        run: |
          dotnet test StarkAgro.sln -c Release --no-build --verbosity normal \
            --settings coverlet.runsettings \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults/coverage

      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate coverage report
        run: |
          export PATH="$HOME/.dotnet/tools:$PATH"
          reportgenerator \
            -reports:"TestResults/coverage/**/coverage.cobertura.xml" \
            -targetdir:"TestResults/CoverageReport" \
            -reporttypes:"Html;TextSummary"

      - name: Enforce 90% line coverage (StarkAgroAPI + Worker)
        run: bash scripts/ci-enforce-line-coverage.sh TestResults/CoverageReport/Summary.txt 90

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: |
            TestResults/CoverageReport/
            TestResults/coverage/**/coverage.cobertura.xml
          retention-days: 14

  frontend:
    name: Frontend (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: StarkAgroUI
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: StarkAgroUI/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Unit tests (Karma)
        run: |
          export CHROME_BIN="$(command -v google-chrome || command -v chromium-browser)"
          npx ng test --watch=false --browsers=ChromeHeadless

      - name: Production build
        run: npm run build -- --configuration=production

  mobile:
    name: Mobile (React Native)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: StarkAgroUI-Mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: StarkAgroUI-Mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Gate de cobertura ligado: o `coverageThreshold` do package.json (linhas/funcs 90%,
      # branches 80%) agora é cumprido e `--coverage` o cobra — o CI falha se regredir.
      - name: Unit tests + cobertura (Jest)
        run: npx jest --ci --coverage

  docker-build:
    name: Docker images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build API image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: StarkAgroAPI/Dockerfile
          push: false
          tags: starkagro-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Worker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: StarkAgroWorker/Dockerfile
          push: false
          tags: agripeweb-worker:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build UI image
        uses: docker/build-push-action@v7
        with:
          context: StarkAgroUI
          file: StarkAgroUI/Dockerfile
          push: false
          tags: starkagro-ui:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
