name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Hostinger VPS
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          MQTT_USERNAME: ${{ secrets.MQTT_USERNAME }}
          MQTT_PASSWORD: ${{ secrets.MQTT_PASSWORD }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: JWT_SECRET_KEY,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,MQTT_USERNAME,MQTT_PASSWORD
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.VPS_DEPLOY_PATH }}"
            if [[ ! -d AgripeWebUI && -d /opt/agripeweb/AgripeWebUI ]]; then
              if [[ -f .env && ! -f /opt/agripeweb/.env ]]; then
                mv .env /opt/agripeweb/.env
              fi
              cd /opt/agripeweb
            fi
            if [[ -d .env ]]; then rm -rf .env; fi
            if [[ ! -f .env ]]; then
              if [[ -x scripts/bootstrap-vps-env-from-secrets.sh ]]; then
                scripts/bootstrap-vps-env-from-secrets.sh .
              elif [[ -x scripts/bootstrap-vps-env.sh ]]; then
                scripts/bootstrap-vps-env.sh . || true
              fi
            fi
            git fetch origin main
            git reset --hard origin/main
            chmod +x scripts/bootstrap-vps-env.sh scripts/bootstrap-vps-env-from-secrets.sh scripts/vps-deploy-from-actions.sh scripts/deploy-hostinger-remote.sh
            if [[ ! -f .env ]]; then
              scripts/bootstrap-vps-env-from-secrets.sh .
            fi
            scripts/vps-deploy-from-actions.sh .

      - name: Health check
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            sleep 15
            curl -fsS https://agripeweb.com/api/v1/health
