# StarkAgro — auto-deploy to Hostinger VPS after successful CI on main.
#
# AUTO-DEPLOY IS OPT-IN: the post-CI (workflow_run) deploy only runs when the repo
# variable AGRIPEWEB_AUTO_DEPLOY == 'true'. Until it is set, merges to main do NOT
# trigger a deploy job (avoids the red "missing server host" failures when the VPS
# SSH secrets aren't configured). Manual deploy is always available via
# `gh workflow run Deploy` (workflow_dispatch) or the manual script
# `scripts/redeploy-starkagro.sh`.
#
# To enable auto-deploy: set repo var AGRIPEWEB_AUTO_DEPLOY=true AND configure the
# production secrets below for the chosen mode.
#
# Deploy modes (pick one on the VPS — see docs/deploy-hostinger.md):
#   A) Self-hosted runner (recommended): infra/scripts/install-github-actions-runner.sh
#      Labels: self-hosted, linux, agripeweb-prod — no inbound SSH from GitHub IPs required.
#      Also set repo var AGRIPEWEB_USE_SELF_HOSTED_DEPLOY=true.
#   B) SSH from GitHub-hosted runners: production secrets (VPS_HOST, VPS_USER,
#      VPS_SSH_KEY, VPS_DEPLOY_PATH) + port 22 open for GitHub Actions IP ranges
#      (infra/scripts/sync-github-actions-ufw-ssh.sh or Hostinger hPanel firewall).

name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_mode:
        description: "Deploy mode (auto prefers self-hosted when online)"
        required: false
        default: auto
        type: choice
        options:
          - auto
          - self-hosted
          - ssh
  pull_request:
    paths:
      - '.github/workflows/deploy.yml'
      - 'infra/scripts/**'
      - 'docs/deploy-hostinger.md'

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}

jobs:
  resolve-deploy-mode:
    name: Resolve deploy mode (auto)
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_mode == 'auto'
    runs-on: ubuntu-latest
    outputs:
      use_self_hosted: ${{ steps.pick.outputs.use_self_hosted }}
    steps:
      - name: Pick self-hosted vs SSH
        id: pick
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          online="$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runners" \
            | jq '[.runners[] | select(.status == "online")] | length')"
          echo "online_runners=${online}"
          if [[ "${online}" -gt 0 ]]; then
            echo "use_self_hosted=true" >> "$GITHUB_OUTPUT"
          else
            echo "use_self_hosted=false" >> "$GITHUB_OUTPUT"
          fi

  validate-deploy-script:
    name: Validate deploy scripts
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Syntax-check deploy scripts
        run: |
          for script in infra/scripts/sync-github-actions-ufw-ssh.sh \
                        infra/scripts/install-github-actions-runner.sh \
                        scripts/deploy-hostinger-remote.sh \
                        scripts/bootstrap-vps-env-from-secrets.sh; do
            if grep -q $'\r' "$script"; then
              echo "$script must use LF line endings (found CRLF)"
              exit 1
            fi
            bash -n "$script"
          done

  deploy-self-hosted:
    name: Deploy on VPS (self-hosted)
    needs: [resolve-deploy-mode]
    runs-on: [self-hosted, linux, agripeweb-prod]
    if: >-
      ${{
        always() &&
        (
          (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_mode == 'self-hosted')
          || (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_mode == 'auto' && needs.resolve-deploy-mode.result == 'success' && needs.resolve-deploy-mode.outputs.use_self_hosted == 'true')
          || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && vars.AGRIPEWEB_AUTO_DEPLOY == 'true' && vars.AGRIPEWEB_USE_SELF_HOSTED_DEPLOY == 'true')
        )
      }}
    timeout-minutes: 90
    environment: production
    steps:
      - name: Resolve deploy directory
        id: paths
        run: |
          dir="${VPS_DEPLOY_PATH:-/opt/agripeweb}"
          if [[ ! -d "$dir" ]]; then
            echo "Deploy dir $dir missing — clone StarkAgro to /opt/agripeweb on the VPS first." >&2
            exit 1
          fi
          echo "dir=$dir" >> "$GITHUB_OUTPUT"

      - name: Fix .git ownership
        working-directory: ${{ steps.paths.outputs.dir }}
        run: |
          sudo chown -R "$(id -un):$(id -gn)" .git || true

      # Mesma regra do job SSH: o .env da VPS é a fonte da verdade e nunca é reescrito a partir
      # dos secrets do GitHub. `git reset --hard` não remove arquivo não-versionado, então o
      # .env e o docker/mosquitto/passwd sobrevivem ao pull.
      - name: Pull main and deploy
        working-directory: ${{ steps.paths.outputs.dir }}
        run: |
          set -euo pipefail
          git fetch origin main
          git reset --hard origin/main
          chmod +x scripts/deploy-hostinger-remote.sh
          ./scripts/deploy-hostinger-remote.sh .

      - name: Health check
        run: |
          sleep 15
          curl -fsS https://starkagro.com.br/api/v1/health

  deploy-ssh:
    name: Deploy to Hostinger VPS
    needs: [resolve-deploy-mode]
    runs-on: ubuntu-latest
    if: >-
      ${{
        always() &&
        (
          (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_mode == 'ssh')
          || (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_mode == 'auto' && (needs.resolve-deploy-mode.result != 'success' || needs.resolve-deploy-mode.outputs.use_self_hosted != 'true'))
          || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && vars.AGRIPEWEB_AUTO_DEPLOY == 'true' && vars.AGRIPEWEB_USE_SELF_HOSTED_DEPLOY != 'true')
        )
      }}
    timeout-minutes: 90
    environment: production
    steps:
      # O deploy usa exatamente o mesmo script do deploy manual (`scripts/redeploy-starkagro.sh`),
      # que envia o código por `git archive` e NÃO toca no .env da VPS.
      #
      # O caminho anterior fazia `git reset --hard` num checkout git na VPS (que não existe — o
      # diretório é criado por `git archive`, sem `.git`) e reescrevia o `.env` a partir dos
      # secrets do GitHub com `--force`. Esse rewrite era um alçapão: `MONGO_PASSWORD` está
      # gravado no volume do Mongo desde a inicialização, então regravá-lo vazio (secret ausente)
      # não troca a senha do banco — só derruba o acesso da API, com o /health ainda em 200.
      # O `.env` de produção é a fonte da verdade dos segredos; o GitHub só guarda o acesso SSH.
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configurar chave SSH
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy (git archive + rebuild, preserva o .env)
        env:
          STARKAGRO_VPS: ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}
          SSH_KEY: /home/runner/.ssh/deploy_key
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
        run: |
          set -euo pipefail
          chmod +x scripts/redeploy-starkagro.sh
          # O próprio script confere que nenhum segredo chegou vazio no container e faz o
          # health check em https://starkagro.com.br/api/v1/health — abortando se falhar.
          bash scripts/redeploy-starkagro.sh origin/main

      - name: Limpar chave SSH
        if: always()
        run: rm -f ~/.ssh/deploy_key
