name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Hostinger VPS
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          MQTT_USERNAME: ${{ secrets.MQTT_USERNAME }}
          MQTT_PASSWORD: ${{ secrets.MQTT_PASSWORD }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: JWT_SECRET_KEY,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,MQTT_USERNAME,MQTT_PASSWORD
          script_stop: true
          script: |
            set -euo pipefail
            export VPS_DEPLOY_PATH="${{ secrets.VPS_DEPLOY_PATH }}"
            cd "$VPS_DEPLOY_PATH"
            git fetch origin main
            git reset --hard origin/main
            chmod +x scripts/bootstrap-vps-env.sh scripts/bootstrap-vps-env-from-secrets.sh scripts/resolve-vps-repo-root.sh scripts/vps-deploy-from-actions.sh scripts/deploy-hostinger-remote.sh
            REPO_ROOT="$(scripts/resolve-vps-repo-root.sh . | tr -d '\r')"
            if [[ -z "$REPO_ROOT" || ! -d "$REPO_ROOT/.git" ]]; then
              echo "ERROR: resolve-vps-repo-root did not return a git checkout" >&2
              exit 1
            fi
            cd "$REPO_ROOT"
            git fetch origin main
            git reset --hard origin/main
            git sparse-checkout disable >/dev/null 2>&1 || true
            git checkout -f HEAD -- AgripeWebUI AgripeWebAPI AgripeWebWorker docker scripts
            chmod +x scripts/bootstrap-vps-env.sh scripts/bootstrap-vps-env-from-secrets.sh scripts/resolve-vps-repo-root.sh scripts/vps-deploy-from-actions.sh scripts/deploy-hostinger-remote.sh
            if [[ -d .env ]]; then rm -rf .env; fi
            if [[ ! -f .env ]]; then
              scripts/bootstrap-vps-env.sh "$REPO_ROOT" || true
            fi
            if [[ ! -f .env ]]; then
              scripts/bootstrap-vps-env-from-secrets.sh "$REPO_ROOT"
            fi
            scripts/vps-deploy-from-actions.sh "$REPO_ROOT"

      - name: Health check
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            sleep 15
            curl -fsS https://agripeweb.com/api/v1/health
