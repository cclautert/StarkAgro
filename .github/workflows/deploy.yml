# AgripeWeb — auto-deploy to Hostinger VPS after successful CI on main.
#
# Deploy modes (pick one on the VPS — see docs/deploy-hostinger.md):
#   A) Self-hosted runner (recommended): infra/scripts/install-github-actions-runner.sh
#      Labels: self-hosted, linux, agripeweb-prod — no inbound SSH from GitHub IPs required.
#   B) SSH from GitHub-hosted runners: production secrets + port 22 open for GitHub Actions
#      IP ranges (infra/scripts/sync-github-actions-ufw-ssh.sh or Hostinger hPanel firewall).

name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_mode:
        description: "Deploy mode (auto prefers self-hosted when online)"
        required: false
        default: auto
        type: choice
        options:
          - auto
          - self-hosted
          - ssh
  pull_request:
    paths:
      - '.github/workflows/deploy.yml'
      - 'infra/scripts/**'
      - 'docs/deploy-hostinger.md'

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}

jobs:
  resolve-deploy-mode:
    name: Resolve deploy mode (auto)
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_mode == 'auto'
    runs-on: ubuntu-latest
    outputs:
      use_self_hosted: ${{ steps.pick.outputs.use_self_hosted }}
    steps:
      - name: Pick self-hosted vs SSH
        id: pick
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          online="$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runners" \
            | jq '[.runners[] | select(.status == "online")] | length')"
          echo "online_runners=${online}"
          if [[ "${online}" -gt 0 ]]; then
            echo "use_self_hosted=true" >> "$GITHUB_OUTPUT"
          else
            echo "use_self_hosted=false" >> "$GITHUB_OUTPUT"
          fi

  validate-deploy-script:
    name: Validate deploy scripts
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Syntax-check deploy scripts
        run: |
          for script in infra/scripts/sync-github-actions-ufw-ssh.sh \
                        infra/scripts/install-github-actions-runner.sh \
                        scripts/deploy-hostinger-remote.sh \
                        scripts/bootstrap-vps-env-from-secrets.sh; do
            if grep -q $'\r' "$script"; then
              echo "$script must use LF line endings (found CRLF)"
              exit 1
            fi
            bash -n "$script"
          done

  deploy-self-hosted:
    name: Deploy on VPS (self-hosted)
    needs: [resolve-deploy-mode]
    runs-on: [self-hosted, linux, agripeweb-prod]
    if: >-
      ${{
        always() &&
        (
          (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_mode == 'self-hosted')
          || (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_mode == 'auto' && needs.resolve-deploy-mode.result == 'success' && needs.resolve-deploy-mode.outputs.use_self_hosted == 'true')
          || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && vars.AGRIPEWEB_USE_SELF_HOSTED_DEPLOY == 'true')
        )
      }}
    timeout-minutes: 90
    environment: production
    steps:
      - name: Resolve deploy directory
        id: paths
        run: |
          dir="${VPS_DEPLOY_PATH:-/opt/agripeweb}"
          if [[ ! -d "$dir" ]]; then
            echo "Deploy dir $dir missing — clone AgripeWeb to /opt/agripeweb on the VPS first." >&2
            exit 1
          fi
          echo "dir=$dir" >> "$GITHUB_OUTPUT"

      - name: Pull main and deploy
        env:
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          MQTT_USERNAME: ${{ secrets.MQTT_USERNAME }}
          MQTT_PASSWORD: ${{ secrets.MQTT_PASSWORD }}
          MONGO_USER: ${{ secrets.MONGO_USER }}
          MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}
        working-directory: ${{ steps.paths.outputs.dir }}
        run: |
          set -euo pipefail
          git fetch origin main
          git reset --hard origin/main
          chmod +x scripts/bootstrap-vps-env-from-secrets.sh scripts/deploy-hostinger-remote.sh
          if [[ -d .env ]]; then rm -rf .env; fi
          ./scripts/bootstrap-vps-env-from-secrets.sh . --force
          ./scripts/deploy-hostinger-remote.sh .

      - name: Health check
        run: |
          sleep 15
          curl -fsS https://agripeweb.com/api/v1/health

  deploy-ssh:
    name: Deploy to Hostinger VPS
    needs: [resolve-deploy-mode]
    runs-on: ubuntu-latest
    if: >-
      ${{
        always() &&
        (
          (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_mode == 'ssh')
          || (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_mode == 'auto' && (needs.resolve-deploy-mode.result != 'success' || needs.resolve-deploy-mode.outputs.use_self_hosted != 'true'))
          || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && vars.AGRIPEWEB_USE_SELF_HOSTED_DEPLOY != 'true')
        )
      }}
    timeout-minutes: 90
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        env:
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          MQTT_USERNAME: ${{ secrets.MQTT_USERNAME }}
          MQTT_PASSWORD: ${{ secrets.MQTT_PASSWORD }}
          MONGO_USER: ${{ secrets.MONGO_USER }}
          MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 60s
          command_timeout: 60m
          envs: JWT_SECRET_KEY,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,MQTT_USERNAME,MQTT_PASSWORD,MONGO_USER,MONGO_PASSWORD
          script_stop: true
          script: |
            set -euo pipefail
            export VPS_DEPLOY_PATH="${{ secrets.VPS_DEPLOY_PATH }}"
            cd "$VPS_DEPLOY_PATH"
            git fetch origin main
            git reset --hard origin/main
            chmod +x scripts/bootstrap-vps-env.sh scripts/bootstrap-vps-env-from-secrets.sh scripts/resolve-vps-repo-root.sh scripts/vps-deploy-from-actions.sh scripts/deploy-hostinger-remote.sh
            REPO_ROOT="$(scripts/resolve-vps-repo-root.sh . | tr -d '\r')"
            if [[ -z "$REPO_ROOT" || ! -d "$REPO_ROOT/.git" ]]; then
              echo "ERROR: resolve-vps-repo-root did not return a git checkout" >&2
              exit 1
            fi
            cd "$REPO_ROOT"
            git fetch origin main
            git reset --hard origin/main
            git sparse-checkout disable >/dev/null 2>&1 || true
            git checkout -f HEAD -- AgripeWebUI AgripeWebAPI AgripeWebWorker docker scripts infra
            chmod +x scripts/bootstrap-vps-env.sh scripts/bootstrap-vps-env-from-secrets.sh scripts/resolve-vps-repo-root.sh scripts/vps-deploy-from-actions.sh scripts/deploy-hostinger-remote.sh
            if [[ -d .env ]]; then rm -rf .env; fi
            scripts/bootstrap-vps-env-from-secrets.sh "$REPO_ROOT" --force
            scripts/vps-deploy-from-actions.sh "$REPO_ROOT"

      - name: Health check
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 60s
          script_stop: true
          script: |
            set -euo pipefail
            sleep 15
            curl -fsS https://agripeweb.com/api/v1/health
