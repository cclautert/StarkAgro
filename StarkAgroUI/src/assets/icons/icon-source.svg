<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#111c2e"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="drop" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#5cc8fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="0.6">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
  </defs>

  <!-- Fundo sangrado: o recorte maskable do Android corta as bordas. -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Gota d'água (mesma silhueta do favicon.svg), dentro do círculo de segurança
       maskable — raio 40% do lado, ou seja 205px a partir do centro. -->
  <g transform="translate(90.2 80.2) scale(5.18)">
    <path d="M32 4 C32 4, 12 28, 12 40 C12 52.15 21.4 60 32 60 C42.6 60 52 52.15 52 40 C52 28 32 4 32 4 Z" fill="url(#drop)"/>
    <ellipse cx="24" cy="36" rx="5" ry="8" fill="rgba(255,255,255,0.25)" transform="rotate(-20 24 36)"/>
  </g>

  <!-- Folha: agro sobre a água. Contorno escuro para separar da gota. -->
  <g transform="translate(272 330) rotate(-32)">
    <path d="M0 0 C 28 -42, 112 -42, 140 0 C 112 42, 28 42, 0 0 Z"
          fill="url(#leaf)" stroke="#0b1220" stroke-width="9" stroke-linejoin="round"/>
    <path d="M6 0 L 134 0" stroke="#0b1220" stroke-width="7" stroke-linecap="round" opacity="0.55"/>
    <path d="M42 -1 L 66 -22 M42 1 L 66 22 M80 -1 L 104 -18 M80 1 L 104 18"
          stroke="#0b1220" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
  </g>
</svg>
