<div class="container">
  <div class="page-header">
    <h1 class="page-title">💧 Pivôs</h1>
    <button class="btn-add" [routerLink]="['/pivots/novo']">+ Novo Pivô</button>
  </div>

  <ng-container *ngIf="pivots$ | async as pivots; else loading">
    <div class="pivot-grid">
      <div class="pivot-card" *ngFor="let pivot of pivots">
        <div class="pivot-card-info">
          <span class="pivot-icon">🔄</span>
          <span class="pivot-name">{{ pivot.name }}</span>
        </div>
        <div class="pivot-card-actions">
          <button class="btn-action btn-edit" (click)="updatePivot(pivot.id!)">Editar</button>
          <button class="btn-action btn-delete" (click)="deletePivot(pivot.id!)">Excluir</button>
        </div>
      </div>
      <div class="empty-state" *ngIf="pivots.length === 0">
        <span>Nenhum pivô cadastrado.</span>
      </div>
    </div>
  </ng-container>

  <ng-template #loading>
    <p class="loading-text">Carregando dados...</p>
  </ng-template>
</div>
