<div class="form-container">
  <h2>Configuração do Pivô</h2>

  <form [formGroup]="configForm" (ngSubmit)="onSubmit()" class="form-fields">

    <div class="form-group">
      <label for="limiteSuperior">Limite Superior</label>
      <input id="limiteSuperior" type="number" formControlName="limiteSuperior" step="0.1">
    </div>

    <div class="form-group">
      <label for="limiteInferior">Limite Inferior</label>
      <input id="limiteInferior" type="number" formControlName="limiteInferior" step="0.1">
    </div>

    <div class="form-group">
      <label for="rainThresholdMm">Chuva mínima para adiar irrigação (mm)</label>
      <input id="rainThresholdMm" type="number" formControlName="rainThresholdMm" step="0.1" min="0" placeholder="Padrão global: 5 mm">
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Salvar</button>
      <button type="button" class="btn btn-secondary" (click)="voltar()">Cancelar</button>
    </div>

  </form>
</div>
